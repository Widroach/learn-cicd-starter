name: cd

on:
    push:
        branches: [main]

    workflow_dispatch:

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.26.0"
                  
            - name: Build App
              run: scripts/buildprod.sh
